<!doctype html>
<html lang="en" data-theme="dark" data-density="cozy">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kuma 3.0 Upgrade Pre-flight Report</title>
<style>
:root{
  --bg:#0a0c11;--bg-grad:#0c0f16;
  --surface:#10141c;--surface-2:#161b26;--surface-3:#1c2331;
  --border:#222a38;--border-2:#2c3648;
  --text:#e8edf4;--muted:#9aa6b8;--faint:#6a7689;
  --accent:#6ea8ff;--accent-2:#8bc0ff;--accent-soft:rgba(110,168,255,.14);
  --blocker:#ff6b62;--blocker-bg:rgba(255,107,98,.11);--blocker-bd:rgba(255,107,98,.40);
  --warning:#e3b341;--warning-bg:rgba(227,179,65,.12);--warning-bd:rgba(227,179,65,.38);
  --info:#67b7ff;--info-bg:rgba(103,183,255,.11);--info-bd:rgba(103,183,255,.36);
  --ok:#54d178;--ok-bg:rgba(84,209,120,.12);--ok-bd:rgba(84,209,120,.40);
  --shadow:0 1px 2px rgba(0,0,0,.30),0 8px 24px -12px rgba(0,0,0,.55);
  --radius:12px;--radius-sm:8px;
  --row:14px;--row-px:16px;
}
html[data-theme="light"]{
  --bg:#f4f6fa;--bg-grad:#eef1f7;
  --surface:#ffffff;--surface-2:#f3f5fa;--surface-3:#e9edf4;
  --border:#dce1ea;--border-2:#cbd3e0;
  --text:#16202e;--muted:#586478;--faint:#8893a5;
  --accent:#2563eb;--accent-2:#1d4ed8;--accent-soft:rgba(37,99,235,.10);
  --blocker:#d83a30;--blocker-bg:rgba(216,58,48,.07);--blocker-bd:rgba(216,58,48,.32);
  --warning:#9a6b00;--warning-bg:rgba(154,107,0,.09);--warning-bd:rgba(154,107,0,.30);
  --info:#1f6feb;--info-bg:rgba(31,111,235,.08);--info-bd:rgba(31,111,235,.28);
  --ok:#1a7f37;--ok-bg:rgba(26,127,55,.09);--ok-bd:rgba(26,127,55,.30);
  --shadow:0 1px 2px rgba(16,24,40,.06),0 10px 24px -14px rgba(16,24,40,.18);
}
html[data-density="compact"]{--row:8px;--row-px:12px}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{margin:0;color:var(--text);
  background:
    radial-gradient(1200px 600px at 78% -8%,var(--accent-soft),transparent 60%),
    linear-gradient(180deg,var(--bg-grad),var(--bg) 360px);
  background-attachment:fixed;
  font:15px/1.55 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
code{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;font-size:.9em}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
button{font:inherit}

/* ---- shell layout: sticky TOC + content ---- */
.layout{max-width:1240px;margin:0 auto;padding:0 24px;
  display:grid;grid-template-columns:minmax(0,1fr);gap:0}
@media(min-width:1040px){
  .layout{grid-template-columns:248px minmax(0,1fr);gap:44px;align-items:start}
}
.sidebar{display:none}
@media(min-width:1040px){
  .sidebar{display:flex;flex-direction:column;gap:14px;position:sticky;top:0;
    max-height:100vh;overflow:auto;padding:26px 4px 26px 0;scrollbar-width:thin}
}
.content{min-width:0;padding:26px 0 110px}

/* ---- brand mark (CSS mesh-node grid, no external asset) ---- */
.mark{width:22px;height:22px;border-radius:6px;flex:none;
  background:
    radial-gradient(circle at center,var(--accent) 1.5px,transparent 1.9px) 0 0/7.3px 7.3px,
    linear-gradient(135deg,var(--accent-soft),transparent);
  box-shadow:inset 0 0 0 1px var(--border-2)}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
.brand .sub{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}

/* ---- sidebar verdict + nav ---- */
.sb-verdict{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);font-weight:650;font-size:13.5px}
.sb-verdict .dot{width:9px;height:9px;border-radius:50%;flex:none}
.sb-verdict.blockers,.sb-verdict.failed{color:var(--blocker)}
.sb-verdict.blockers .dot,.sb-verdict.failed .dot{background:var(--blocker);box-shadow:0 0 0 4px var(--blocker-bg)}
.sb-verdict.inconclusive{color:var(--warning)}
.sb-verdict.inconclusive .dot{background:var(--warning);box-shadow:0 0 0 4px var(--warning-bg)}
.sb-verdict.clean{color:var(--ok)}
.sb-verdict.clean .dot{background:var(--ok);box-shadow:0 0 0 4px var(--ok-bg)}
nav.toc{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.toc .nav-sev{display:flex;align-items:center;gap:9px;width:100%;text-align:left;cursor:pointer;
  background:none;border:0;color:var(--text);font-weight:680;font-size:13.5px;
  padding:8px 9px;border-radius:8px;margin-top:8px;transition:background .12s}
.toc .nav-sev:hover{background:var(--surface-2)}
.toc .nav-ico{width:9px;height:9px;border-radius:3px;flex:none}
.toc .nav-ico.blocker{background:var(--blocker)}
.toc .nav-ico.warning{background:var(--warning)}
.toc .nav-ico.info{background:var(--info)}
.toc .nav-lbl{flex:1}
.toc .nav-n{font-variant-numeric:tabular-nums;color:var(--muted);font-weight:700;font-size:12px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:0 7px;min-width:24px;text-align:center}
.toc .nav-grp{display:flex;align-items:center;gap:8px;width:100%;text-align:left;cursor:pointer;
  background:none;border:0;color:var(--muted);font-size:12.5px;padding:5px 9px 5px 27px;border-radius:7px;
  transition:background .12s,color .12s;border-left:2px solid transparent}
.toc .nav-grp:hover{background:var(--surface-2);color:var(--text)}
.toc .nav-grp.active{color:var(--text);background:var(--accent-soft);border-left-color:var(--accent)}
.toc .nav-grp .nav-grp-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toc .nav-grp .nav-n.sm{font-size:11px;min-width:20px;padding:0 5px}
.toc .nav-link{display:flex;align-items:center;gap:8px;width:100%;text-align:left;cursor:pointer;
  background:none;border:0;color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 9px;border-radius:7px;margin-top:6px}
.toc .nav-link:hover{background:var(--surface-2);color:var(--text)}
.sb-tools{display:flex;gap:8px;margin-top:auto;padding-top:14px}

/* ---- header ---- */
header.rep{margin-bottom:6px}
header.rep .htop{display:flex;align-items:center;gap:11px;margin-bottom:14px}
header.rep h1{font-size:23px;line-height:1.2;margin:0;letter-spacing:-.01em;font-weight:730}
.meta{color:var(--muted);font-size:12.5px;display:flex;flex-wrap:wrap;gap:4px 8px;align-items:center}
.meta .b{color:var(--text);font-weight:620}
.meta .sep{color:var(--faint)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:13px;align-items:center}
.chips .lbl{color:var(--faint);font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:650;margin-right:2px}
.chip{background:var(--surface-2);border:1px solid var(--border);border-radius:999px;
  padding:3px 11px;font-size:12px;color:var(--muted)}
.chip.mesh{color:var(--text);cursor:pointer;font-weight:560;
  transition:border-color .14s,background .14s,color .14s}
.chip.mesh:hover{border-color:var(--accent);color:var(--text)}
.chip.mesh.active{background:var(--accent);border-color:var(--accent);color:#06101f;font-weight:700}
.chip.morechip{cursor:pointer;color:var(--accent);background:none;border-style:dashed}

/* ---- verdict banner ---- */
.banner{margin:18px 0;padding:15px 18px;border-radius:var(--radius);
  border:1px solid transparent;display:flex;align-items:flex-start;gap:13px;box-shadow:var(--shadow)}
.banner .glyph{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;
  font-weight:800;font-size:16px}
.banner .btxt{display:flex;flex-direction:column;gap:2px}
.banner .btxt b{font-size:15.5px;font-weight:700}
.banner .btxt span{font-size:13px;opacity:.92}
.banner.blockers,.banner.failed{background:var(--blocker-bg);border-color:var(--blocker-bd);color:var(--blocker)}
.banner.blockers .glyph,.banner.failed .glyph{background:var(--blocker);color:#1a0605}
.banner.inconclusive{background:var(--warning-bg);border-color:var(--warning-bd);color:var(--warning)}
.banner.inconclusive .glyph{background:var(--warning);color:#181203}
.banner.clean{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok)}
.banner.clean .glyph{background:var(--ok);color:#04140a}

/* ---- spotless celebration (migration done, nothing flagged) ---- */
.celebrate{margin:26px 0;padding:52px 32px 44px;border-radius:16px;text-align:center;
  border:1px solid var(--ok-bd);box-shadow:var(--shadow);
  background:radial-gradient(680px 240px at 50% -12%,var(--ok-bg),transparent 70%),var(--surface)}
.cel-badge{width:72px;height:72px;border-radius:50%;margin:0 auto 22px;display:grid;place-items:center;
  font-size:38px;font-weight:800;color:#04140a;background:var(--ok);box-shadow:0 0 0 10px var(--ok-bg)}
.celebrate h2{font-size:26px;margin:0 0 12px;letter-spacing:-.02em;font-weight:760;color:var(--text)}
.celebrate p{margin:0 auto;max-width:580px;color:var(--muted);font-size:15px;line-height:1.6}
.cel-congrats{margin-top:20px!important;color:var(--ok)!important;font-weight:680;font-size:16.5px!important}
.cel-meta{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:26px}
.cel-meta span{background:var(--surface-2);border:1px solid var(--border);border-radius:999px;
  padding:4px 13px;font-size:12.5px;color:var(--muted)}
.cel-meta b{color:var(--text);font-variant-numeric:tabular-nums}

/* ---- overview: stat cards + stacked bar ---- */
.overview{margin:18px 0 8px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:11px}
.card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:13px 15px 14px;text-align:left;overflow:hidden;transition:border-color .14s,transform .08s}
button.card{cursor:pointer;color:inherit}
button.card:hover{border-color:var(--border-2)}
button.card:active{transform:translateY(1px)}
.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border-2)}
.card.blocker::before{background:var(--blocker)}
.card.warning::before{background:var(--warning)}
.card.info::before{background:var(--info)}
.card .n{font-size:27px;font-weight:760;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.card.blocker .n{color:var(--blocker)}
.card.warning .n{color:var(--warning)}
.card.info .n{color:var(--info)}
.card .l{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:7px;font-weight:620}
.card .l2{font-size:11px;color:var(--faint);margin-top:3px;font-variant-numeric:tabular-nums}
.card.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.card .pin{position:absolute;top:9px;right:11px;font-size:10px;color:var(--accent);font-weight:700;display:none}
.card.on .pin{display:block}
.sevbar-wrap{margin-top:13px;display:flex;flex-direction:column;gap:8px}
.sevbar{display:flex;height:9px;border-radius:999px;overflow:hidden;background:var(--surface-2);
  border:1px solid var(--border)}
.sevbar i{display:block;height:100%;min-width:0}
.sevbar i.blocker{background:var(--blocker)}
.sevbar i.warning{background:var(--warning)}
.sevbar i.info{background:var(--info)}
.sevbar i.ok{background:var(--ok)}
.sevleg{display:flex;flex-wrap:wrap;gap:5px 16px;font-size:12px;color:var(--muted)}
.sevleg span{display:inline-flex;align-items:center;gap:6px}
.sevleg .d{width:8px;height:8px;border-radius:2px}
.sevleg .d.blocker{background:var(--blocker)}.sevleg .d.warning{background:var(--warning)}
.sevleg .d.info{background:var(--info)}.sevleg .d.ok{background:var(--ok)}
.sevleg b{color:var(--text);font-variant-numeric:tabular-nums}

/* ---- toolbar (sticky) ---- */
.toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin:18px 0 6px;
  position:sticky;top:0;z-index:20;padding:11px 0;
  background:linear-gradient(180deg,var(--bg) 62%,transparent);backdrop-filter:blur(4px)}
.search{flex:1;min-width:190px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-size:14px;transition:border-color .14s}
.search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 12px;color:var(--text);cursor:pointer;font-size:12.5px;font-weight:600;white-space:nowrap;
  transition:border-color .14s,background .14s}
.btn:hover{border-color:var(--accent);background:var(--surface-2)}
.btn.icon{padding:8px 10px}

/* ---- finding sections / groups ---- */
section.grp{margin:24px 0;scroll-margin-top:74px;content-visibility:auto;contain-intrinsic-size:auto 600px}
section.grp>.sechead{display:flex;align-items:center;gap:9px;margin:0 0 4px;font-size:13px;
  color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
section.grp>.sechead .sd{width:9px;height:9px;border-radius:3px}
section.grp>.sechead .sd.blocker{background:var(--blocker)}
section.grp>.sechead .sd.warning{background:var(--warning)}
section.grp>.sechead .sd.info{background:var(--info)}
section.grp>.sechead .n{margin-left:auto;color:var(--faint);font-weight:700;font-variant-numeric:tabular-nums}
.grpblock{scroll-margin-top:74px}
.grp-title{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
  background:var(--surface-2);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-weight:700;font-size:14.5px;
  padding:11px 15px;margin:12px 0 8px;cursor:pointer;transition:border-color .14s,background .14s}
.grp-title:hover{border-color:var(--border-2)}
.grp-title .caret{color:var(--faint);font-size:11px;transition:transform .15s;width:10px}
.grp-title:not(.collapsed) .caret{transform:rotate(90deg)}
.grp-title .grp-count{margin-left:auto;background:var(--bg);border:1px solid var(--border);
  border-radius:999px;padding:2px 11px;font-size:12.5px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.grp-body{margin:0 0 6px;display:flex;flex-direction:column;gap:7px}

/* ---- one finding: collapsible row, all detail hidden until opened ---- */
.finding{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:border-color .14s}
.finding:hover{border-color:var(--border-2)}
.finding.blocker{box-shadow:inset 3px 0 0 var(--blocker)}
.finding.warning{box-shadow:inset 3px 0 0 var(--warning)}
.finding.info{box-shadow:inset 3px 0 0 var(--info)}
.f-head{display:flex;align-items:center;gap:11px;width:100%;text-align:left;cursor:pointer;
  background:none;border:0;color:var(--text);padding:var(--row) var(--row-px);padding-left:calc(var(--row-px) + 3px)}
.f-head:hover{background:var(--surface-2)}
.f-tick{width:7px;height:7px;border-radius:50%;flex:none}
.f-tick.blocker{background:var(--blocker)}.f-tick.warning{background:var(--warning)}.f-tick.info{background:var(--info)}
.f-title{font-weight:630;font-size:14.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.finding:not(.collapsed) .f-title{white-space:normal}
.f-meta{display:flex;gap:5px;align-items:center;flex:none}
.f-meta .tag{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;
  padding:1px 7px;font-size:11px;color:var(--muted);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.f-meta .tag.cp{color:var(--accent);border-color:var(--accent-soft);background:var(--accent-soft)}
@media(max-width:680px){.f-meta{display:none}}
.f-count{font-variant-numeric:tabular-nums;font-weight:720;font-size:13px;color:var(--text);
  background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:1px 10px;flex:none}
.finding.blocker .f-count{color:var(--blocker)}
.f-caret{color:var(--faint);font-size:11px;flex:none;transition:transform .15s}
.finding:not(.collapsed) .f-caret{transform:rotate(90deg)}
.f-body{padding:0 var(--row-px) 15px;padding-left:calc(var(--row-px) + 3px);
  border-top:1px solid var(--border);margin-top:-1px;padding-top:13px;
  display:flex;flex-direction:column;gap:0}
.f-body .detail{color:var(--muted);font-size:13.5px;margin:0}
.f-body .detail.note{color:var(--warning);margin-top:8px}
.ex{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.ex .e{background:var(--surface-2);border:1px solid var(--border);border-radius:6px;
  padding:2px 8px;font-size:11.5px;font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--text)}
.ex .e.sys{border-color:var(--warning-bd);color:var(--warning)}
.ex .more{color:var(--faint);font-size:11.5px;align-self:center;font-variant-numeric:tabular-nums}
.doclink{display:inline-flex;align-items:center;gap:6px;margin-top:13px;font-size:12.5px;font-weight:650;
  align-self:flex-start;background:var(--accent-soft);border:1px solid transparent;
  padding:5px 11px;border-radius:7px;transition:border-color .14s}
.doclink:hover{border-color:var(--accent);text-decoration:none}
.doclink .arr{color:var(--accent)}

/* ---- meshhint / empty ---- */
.meshhint{display:flex;flex-wrap:wrap;align-items:center;gap:6px;color:var(--muted);
  font-size:13px;margin:0 0 12px;padding:9px 13px;background:var(--accent-soft);border-radius:9px}
.meshhint b{color:var(--text)}
.meshhint button{background:none;border:0;color:var(--accent);cursor:pointer;font:inherit;padding:0;text-decoration:underline}
.empty{color:var(--muted);padding:34px;text-align:center;border:1px dashed var(--border);border-radius:var(--radius);background:var(--surface)}

/* ---- coverage + manual ---- */
.blockhead{font-size:16px;font-weight:720;margin:0 0 4px;letter-spacing:-.01em}
.blocksub{color:var(--muted);font-size:13px;margin:0 0 12px}
ul.manual{padding-left:0;margin:8px 0;list-style:none;display:flex;flex-direction:column;gap:8px}
ul.manual li{background:var(--surface);border:1px solid var(--border);
  box-shadow:inset 3px 0 0 var(--warning);border-radius:var(--radius);padding:13px 16px}
ul.manual label{display:flex;gap:11px;align-items:flex-start;cursor:pointer}
ul.manual label span{font-size:14.5px;font-weight:630}
ul.manual input{margin-top:4px;accent-color:var(--accent);width:15px;height:15px;flex:none}
ul.manual .detail{color:var(--muted);font-size:13.5px;margin:8px 0 0 26px}
.cmdbox{position:relative;margin:10px 0 0 26px}
.cmdbox .cmd{margin:0;padding:11px 64px 11px 13px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:8px;overflow-x:auto;
  font-size:12.5px;white-space:pre;color:var(--text)}
.cmdbox .copy{position:absolute;top:8px;right:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:6px;color:var(--muted);
  font-size:11.5px;padding:4px 10px;cursor:pointer;font-weight:600}
.cmdbox .copy:hover{color:var(--text);border-color:var(--accent)}
.cmd-collapsible{margin:10px 0 0 26px}
.cmd-collapsible>summary{cursor:pointer;list-style:none;color:var(--accent);
  font-size:12.5px;font-weight:650;padding:5px 0;user-select:none}
.cmd-collapsible>summary::-webkit-details-marker{display:none}
.cmd-collapsible>summary::before{content:'\25B8 ';color:var(--faint)}
.cmd-collapsible[open]>summary::before{content:'\25BE '}
.cmd-collapsible>summary:hover{text-decoration:underline}
.cmd-collapsible .cmdbox{margin:6px 0 0 0}
ul.manual li.done{box-shadow:inset 3px 0 0 var(--border-2);opacity:.85}
.done span{text-decoration:line-through;color:var(--muted)}
.done .detail,.done .cmdbox,.done .cmd-collapsible{opacity:.55}
.prog{color:var(--muted);font-size:13px;margin:0 0 10px;font-variant-numeric:tabular-nums}
.src{color:var(--faint);font-size:12px;margin-top:46px;border-top:1px solid var(--border);padding-top:16px}
.err{background:var(--surface-2);border:1px solid var(--blocker);border-radius:8px;padding:13px;
  font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;white-space:pre-wrap;margin-top:14px}

/* ---- print: expand everything, drop chrome, force light ---- */
@media print{
  html{--bg:#fff;--bg-grad:#fff}
  body{background:#fff;color:#111}
  .sidebar,.toolbar,.sb-tools,.f-caret,.grp-title .caret{display:none!important}
  .layout{grid-template-columns:1fr;max-width:none;padding:0}
  .f-body{display:flex!important}
  .finding,section.grp,.grpblock,ul.manual li{break-inside:avoid;content-visibility:visible}
  .banner,.card,.finding{box-shadow:none}
}
</style>
</head>
<body>
<div class="layout" id="app"></div>
<noscript><div class="layout"><div class="content"><p>This interactive report needs JavaScript. Re-run kuma3-preflight with <code>--format json</code> for a static machine-readable view.</p></div></div></noscript>
<script id="report-data" type="application/json">
{
  "schema": "kuma3-preflight/v3",
  "tool": "kuma3-preflight",
  "generatedAt": "2026-06-25T09:30:00Z",
  "status": "clean",
  "address": "http://localhost:5681",
  "controlPlane": {
    "product": "Kong Mesh",
    "version": "2.14.2",
    "mode": "global"
  },
  "meshes": [
    "default",
    "payments",
    "checkout",
    "orders",
    "shipping",
    "platform"
  ],
  "summary": {
    "blockers": 0,
    "warnings": 0,
    "info": 0,
    "coverageGaps": 0,
    "parseErrors": 0,
    "systemFindings": 0
  },
  "findings": [],
  "coverageGaps": [],
  "manualChecks": []
}
</script>
<script>
(function(){
  var app = document.getElementById('app');
  var data;
  try { data = JSON.parse(document.getElementById('report-data').textContent); }
  catch(e){ app.textContent = 'Failed to parse report data: ' + e; return; }

  var SEV = ['blocker','warning','info'];
  var SEVKEY = {blocker:'blockers', warning:'warnings', info:'info'};
  var SEVLABEL = {blocker:'Blockers', warning:'Warnings', info:'Info'};
  var HEADINGS = {
    blocker:'Blockers — must resolve before upgrading',
    warning:'Warnings — review before upgrading',
    info:'Informational'
  };
  var GLYPH = {blockers:'✕', failed:'✕', inconclusive:'!', clean:'✓'};

  var query = '';
  var meshFilter = null;
  var sevFilter = null;
  var collapsedGroups = {};   // keyed "<severity>|<group>"; persists across re-renders
  var collapsedFindings = {}; // keyed by fid(f); undefined => default for report size
  // A large report defaults every finding to collapsed so the page opens as a
  // scannable index (one row per finding) rather than a wall of detail.
  var bigReport = (data.findings || []).length > 12;
  var spy = null;

  function groupOf(f){ return f.group || f.category; }
  function fid(f){ return f.severity + '|' + groupOf(f) + '|' + f.title; }
  function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }

  // The authoritative mesh set; an example "belongs" to a mesh only if its
  // leading segment matches a real mesh name. This disambiguates resource refs
  // ("mesh/name", "mesh (field)", bare "mesh") from control-plane-wide examples
  // ("experimental.x=false", inspect coverage "0/1") which carry no mesh.
  var meshSet = {};
  (data.meshes || []).forEach(function(m){ meshSet[m] = true; });

  function meshOf(example){
    var s = example.replace(/ \(system[^)]*\)\s*$/, '');
    var cand, slash = s.indexOf('/');
    if(slash > 0){ cand = s.slice(0, slash); }
    else { var p = s.indexOf(' ('); cand = p > 0 ? s.slice(0, p) : s; }
    return meshSet[cand] ? cand : null;
  }
  function findingMeshes(f){
    if(!f._meshes){
      var seen = {};
      (f.examples || []).forEach(function(e){ var m = meshOf(e); if(m) seen[m] = true; });
      f._meshes = Object.keys(seen);
    }
    return f._meshes;
  }
  function isMeshScoped(f){ return findingMeshes(f).length > 0; }
  // The examples are a server-capped sample (exampleCap). When count exceeds the
  // held examples, the sample is partial: a mesh can have occurrences that fall
  // outside it, so the per-mesh attribution below cannot be trusted to be
  // complete. attributable() means "examples are exhaustive, so membership and
  // per-mesh counts are exact".
  function isCapped(f){ return f.count > (f.examples || []).length; }
  function attributable(f){ return isMeshScoped(f) && !isCapped(f); }
  function shownExamples(f){
    var ex = f.examples || [];
    if(meshFilter && attributable(f)) return ex.filter(function(e){ return meshOf(e) === meshFilter; });
    return ex;
  }
  // Effective count under the active filter. Exact per-mesh count only when the
  // finding is attributable; for a capped finding we show its true total across
  // all meshes (renderFinding flags that it is not split per mesh).
  function shownCount(f){
    if(meshFilter && attributable(f)) return shownExamples(f).length;
    return f.count;
  }

  function el(tag, attrs, kids){
    var n = document.createElement(tag);
    if(attrs) for(var k in attrs){
      if(k === 'class') n.className = attrs[k];
      else if(k === 'text') n.textContent = attrs[k];
      else if(k.slice(0,2) === 'on') n.addEventListener(k.slice(2), attrs[k]);
      else n.setAttribute(k, attrs[k]);
    }
    if(kids != null){
      if(!Array.isArray(kids)) kids = [kids];
      kids.forEach(function(c){
        if(c == null) return;
        n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
    }
    return n;
  }

  // ---- theme + density (persisted) ----
  var savedTheme = localStorage.getItem('kuma3pf-theme');
  if(savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
  var savedDensity = localStorage.getItem('kuma3pf-density');
  if(savedDensity) document.documentElement.setAttribute('data-density', savedDensity);
  function themeBtn(){
    function label(){ return document.documentElement.getAttribute('data-theme') === 'light' ? 'Dark' : 'Light'; }
    return el('button', {class:'btn icon', title:'Toggle light/dark theme', onclick:function(){
      var cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', cur);
      localStorage.setItem('kuma3pf-theme', cur);
      this.textContent = label();
    }}, label());
  }
  function densityBtn(){
    function label(){ return document.documentElement.getAttribute('data-density') === 'compact' ? 'Cozy' : 'Compact'; }
    return el('button', {class:'btn icon', title:'Toggle row density', onclick:function(){
      var cur = document.documentElement.getAttribute('data-density') === 'compact' ? 'cozy' : 'compact';
      document.documentElement.setAttribute('data-density', cur);
      localStorage.setItem('kuma3pf-density', cur);
      this.textContent = label();
    }}, label());
  }

  function fmtTime(s){
    if(!s) return '';
    var d = new Date(s);
    return isNaN(d) ? s : d.toLocaleString();
  }
  // Thousands separators so large occurrence counts stay legible at scale.
  function fmtNum(n){ return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

  function scrollToId(id){
    var t = document.getElementById(id);
    if(t) t.scrollIntoView({block:'start'});
  }

  // ---- which findings are visible under the active filters ----
  function matches(f){
    if(sevFilter && f.severity !== sevFilter) return false;
    // A mesh filter hides a finding scoped to OTHER meshes — but only when its
    // mesh membership is exhaustive (attributable). A capped finding might have
    // occurrences in the selected mesh beyond its sample, so it is never hidden.
    if(meshFilter && attributable(f) && findingMeshes(f).indexOf(meshFilter) < 0) return false;
    if(!query) return true;
    var hay = (f.title + ' ' + f.detail + ' ' + f.category + ' ' + (f.examples||[]).join(' ')).toLowerCase();
    return hay.indexOf(query) >= 0;
  }
  function shownFindings(){ return (data.findings || []).filter(matches); }

  // ---- sidebar table-of-contents (rebuilt to reflect active filters) ----
  var cp = data.controlPlane || {};
  function buildSidebar(){
    var sb = el('aside', {class:'sidebar'});
    sb.appendChild(el('div', {class:'brand'}, [
      el('span', {class:'mark'}),
      el('span', null, [document.createTextNode('Pre-flight'),
        el('div', {class:'sub', text:'Kuma 3.0 upgrade'})])
    ]));
    var st = data.status;
    var vlabel = st === 'blockers' ? 'Not upgrade-ready'
      : st === 'failed' ? 'Audit failed'
      : st === 'inconclusive' ? 'Inconclusive'
      : isSpotless() ? 'Upgrade-ready' : 'No blockers found';
    sb.appendChild(el('div', {class:'sb-verdict ' + st}, [el('span', {class:'dot'}), vlabel]));
    sb.appendChild(el('nav', {class:'toc', id:'nav'}));
    sb.appendChild(el('div', {class:'sb-tools'}, [densityBtn(), themeBtn()]));
    return sb;
  }

  function navLink(label, n, target){
    return el('button', {class:'nav-link', type:'button', onclick:function(){ scrollToId(target); }}, [
      el('span', {text:label, style:'flex:1'}),
      el('span', {class:'nav-n sm', text:String(n)})
    ]);
  }

  function buildNav(shown){
    var nav = document.getElementById('nav');
    if(!nav) return;
    nav.innerHTML = '';
    SEV.forEach(function(sev){
      var fs = shown.filter(function(f){ return f.severity === sev; });
      if(!fs.length) return;
      var total = fs.reduce(function(a,f){ return a + shownCount(f); }, 0);
      nav.appendChild(el('button', {class:'nav-sev', type:'button',
        onclick:function(){ scrollToId('sec-' + sev); }}, [
        el('span', {class:'nav-ico ' + sev}),
        el('span', {class:'nav-lbl', text:SEVLABEL[sev]}),
        el('span', {class:'nav-n num', text:fmtNum(total)})
      ]));
      var order = [], byG = {};
      fs.forEach(function(f){ var g = groupOf(f); if(!byG[g]){ byG[g] = []; order.push(g); } byG[g].push(f); });
      order.forEach(function(g){
        var gt = byG[g].reduce(function(a,f){ return a + shownCount(f); }, 0);
        nav.appendChild(el('button', {class:'nav-grp', type:'button', 'data-target':'g-' + sev + '-' + slug(g),
          onclick:function(){ scrollToId('g-' + sev + '-' + slug(g)); }}, [
          el('span', {class:'nav-grp-lbl', text:g, title:g}),
          el('span', {class:'nav-n sm num', text:fmtNum(gt)})
        ]));
      });
    });
    if((data.coverageGaps || []).length) nav.appendChild(navLink('Coverage gaps', (data.coverageGaps||[]).length, 'sec-coverage'));
    if((data.manualChecks || []).length) nav.appendChild(navLink('Manual checks', (data.manualChecks||[]).length, 'sec-manual'));
    // setupSpy is deliberately NOT called here: buildNav runs before the group
    // sections are appended to the DOM, so the observer must be (re)armed by the
    // caller once the .grpblock elements exist.
  }

  // Highlight the group nav entry whose section is in view.
  function setupSpy(){
    if(!('IntersectionObserver' in window)) return;
    if(spy) spy.disconnect();
    var links = {};
    document.querySelectorAll('.nav-grp').forEach(function(b){ links[b.getAttribute('data-target')] = b; });
    spy = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        var b = links[en.target.id];
        if(!b) return;
        if(en.isIntersecting){
          document.querySelectorAll('.nav-grp.active').forEach(function(x){ x.classList.remove('active'); });
          b.classList.add('active');
        }
      });
    }, {rootMargin:'-10% 0px -80% 0px', threshold:0});
    document.querySelectorAll('.grpblock').forEach(function(s){ spy.observe(s); });
  }

  // ---- header ----
  function renderHeader(){
    var h = el('header', {class:'rep'});
    h.appendChild(el('div', {class:'htop'}, [
      el('span', {class:'mark'}),
      el('h1', {text:'Kuma 3.0 Upgrade Pre-flight Report'})
    ]));
    var meta = el('div', {class:'meta'});
    function part(txt, bold){ meta.appendChild(el('span', {class:(bold ? 'b' : ''), text:txt})); }
    function sep(){ meta.appendChild(el('span', {class:'sep', text:'·'})); }
    part((cp.product || 'Kuma') + ' ' + (cp.version || ''), true);
    if(cp.mode){ sep(); part('mode: ' + cp.mode); }
    sep(); part((data.meshes || []).length + ' mesh' + ((data.meshes||[]).length === 1 ? '' : 'es'));
    if(data.address){ sep(); part(data.address); }
    if(data.generatedAt){ sep(); part(fmtTime(data.generatedAt)); }
    h.appendChild(meta);

    var meshes = data.meshes || [];
    if(meshes.length){
      var chips = el('div', {class:'chips'});
      chips.appendChild(el('span', {class:'lbl', text:'Meshes'}));
      var CAP = 12, shown = meshes.slice(0, CAP);
      shown.forEach(function(m){ chips.appendChild(meshChip(m)); });
      if(meshes.length > CAP){
        var moreBtn = el('button', {class:'chip morechip', type:'button',
          text:'+' + (meshes.length - CAP) + ' more'});
        moreBtn.addEventListener('click', function(){
          meshes.slice(CAP).forEach(function(m){ chips.insertBefore(meshChip(m), moreBtn); });
          chips.removeChild(moreBtn);
        });
        chips.appendChild(moreBtn);
      }
      h.appendChild(chips);
    }
    return h;
  }
  function meshChip(m){
    return el('button', {'class':'chip mesh', 'data-mesh':m, type:'button', 'aria-pressed':'false',
      title:'Show only ' + m + ' findings',
      onclick:function(){ setMeshFilter(meshFilter === m ? null : m); }}, m);
  }
  function setMeshFilter(m){
    meshFilter = m;
    document.querySelectorAll('.chip.mesh').forEach(function(c){
      var on = c.getAttribute('data-mesh') === meshFilter;
      c.classList.toggle('active', on);
      c.setAttribute('aria-pressed', String(on));
    });
    renderFindings();
  }

  function renderBanner(){
    var st = data.status;
    var s = data.summary || {};
    var title, sub;
    if(st === 'failed'){ title = 'Audit failed'; sub = 'Do NOT treat this control plane as upgrade-safe — re-run after fixing the cause.'; }
    else if(st === 'blockers'){ title = fmtNum(s.blockers) + ' blocker' + (s.blockers === 1 ? '' : 's') + ' must be resolved before upgrading to 3.0'; sub = 'Each blocker is a removed or relocated API that breaks on 3.0. Work through the sections below.'; }
    else if(st === 'inconclusive'){ title = 'Inconclusive — not a clean bill of health'; sub = 'No blockers found, but some collections could not be read. Resolve the coverage gaps before trusting this result.'; }
    else { title = 'No blocking resources or Mesh settings found'; sub = 'Review the warnings, informational notes and manual checks before upgrading.'; }
    return el('div', {class:'banner ' + st}, [
      el('div', {class:'glyph', text:GLYPH[st] || '!'}),
      el('div', {class:'btxt'}, [el('b', {text:title}), el('span', {text:sub})])
    ]);
  }

  // ---- overview: stat cards + stacked severity bar ----
  function renderOverview(){
    var s = data.summary || {};
    var wrap = el('div', {class:'overview'});
    var cards = el('div', {class:'cards'});
    SEV.forEach(function(sev){
      var n = s[SEVKEY[sev]] || 0;
      // n is occurrences (resources affected); types is the distinct, actionable
      // issue count — both matter at scale ("1,641 resources, 24 issue types").
      var types = (data.findings || []).filter(function(f){ return f.severity === sev; }).length;
      var card = el('button', {class:'card ' + sev + (sevFilter === sev ? ' on' : ''), type:'button',
        'data-sev':sev, 'aria-pressed':String(sevFilter === sev),
        title:(sevFilter === sev ? 'Clear filter' : 'Show only ' + sev + 's'),
        onclick:function(){ setSevFilter(sevFilter === sev ? null : sev); }});
      card.appendChild(el('span', {class:'pin', text:'FILTERED'}));
      card.appendChild(el('div', {class:'n', text:fmtNum(n)}));
      card.appendChild(el('div', {class:'l', text:SEVLABEL[sev]}));
      card.appendChild(el('div', {class:'l2 num', text:types + ' issue type' + (types === 1 ? '' : 's')}));
      cards.appendChild(card);
    });
    [['coverageGaps','Coverage gaps'],['parseErrors','Unparseable'],['systemFindings','System-managed']].forEach(function(e){
      var n = s[e[0]] || 0;
      if(!n) return;
      var card = el('div', {class:'card'});
      card.appendChild(el('div', {class:'n', text:String(n)}));
      card.appendChild(el('div', {class:'l', text:e[1]}));
      cards.appendChild(card);
    });
    wrap.appendChild(cards);

    var b = s.blockers || 0, w = s.warnings || 0, i = s.info || 0, tot = b + w + i;
    var barWrap = el('div', {class:'sevbar-wrap'});
    var bar = el('div', {class:'sevbar', role:'img',
      'aria-label':b + ' blockers, ' + w + ' warnings, ' + i + ' info'});
    if(tot === 0){ bar.appendChild(el('i', {class:'ok', style:'flex:1'})); }
    else {
      [['blocker',b],['warning',w],['info',i]].forEach(function(p){
        if(p[1] > 0) bar.appendChild(el('i', {class:p[0], style:'flex:' + p[1]}));
      });
    }
    barWrap.appendChild(bar);
    var leg = el('div', {class:'sevleg'});
    [['blocker','Blockers',b],['warning','Warnings',w],['info','Info',i]].forEach(function(p){
      leg.appendChild(el('span', null, [el('span', {class:'d ' + p[0]}),
        el('b', {class:'num', text:fmtNum(p[2])}), document.createTextNode(' ' + p[1])]));
    });
    barWrap.appendChild(leg);
    wrap.appendChild(barWrap);
    return wrap;
  }
  function setSevFilter(sev){
    sevFilter = sev;
    document.querySelectorAll('.card[data-sev]').forEach(function(c){
      var on = c.getAttribute('data-sev') === sevFilter;
      c.classList.toggle('on', on);
      c.setAttribute('aria-pressed', String(on));
    });
    renderFindings();
  }

  function renderToolbar(){
    var bar = el('div', {class:'toolbar'});
    bar.appendChild(el('input', {class:'search', type:'search', name:'filter', id:'filter-findings',
      placeholder:'Filter findings by title, detail or example…', 'aria-label':'Filter findings',
      oninput:function(){ query = this.value.toLowerCase(); renderFindings(); }}));
    bar.appendChild(el('button', {class:'btn', type:'button', title:'Expand every finding',
      onclick:function(){ setAllFindings(false); }}, 'Expand all'));
    bar.appendChild(el('button', {class:'btn', type:'button', title:'Collapse every finding',
      onclick:function(){ setAllFindings(true); }}, 'Collapse all'));
    bar.appendChild(el('button', {class:'btn', type:'button', onclick:function(){
      query = ''; sevFilter = null;
      var sb = document.querySelector('.search'); if(sb) sb.value = '';
      document.querySelectorAll('.card[data-sev]').forEach(function(c){ c.classList.remove('on'); c.setAttribute('aria-pressed','false'); });
      setMeshFilter(null);
    }}, 'Reset'));
    return bar;
  }
  function setAllFindings(collapsed){
    (data.findings || []).forEach(function(f){ collapsedFindings[fid(f)] = collapsed; });
    renderFindings();
  }

  function findingCollapsed(f){
    var id = fid(f);
    return (id in collapsedFindings) ? collapsedFindings[id] : bigReport;
  }

  function renderFinding(f){
    var id = fid(f);
    var collapsed = findingCollapsed(f);
    var wrap = el('div', {class:'finding ' + f.severity + (collapsed ? ' collapsed' : '')});
    var cnt = shownCount(f);
    var spanAll = meshFilter && isMeshScoped(f) && isCapped(f);

    var head = el('button', {class:'f-head', type:'button', 'aria-expanded':String(!collapsed)});
    head.appendChild(el('span', {class:'f-tick ' + f.severity}));
    head.appendChild(el('span', {class:'f-title', text:f.title}));
    var meta = el('span', {class:'f-meta'});
    var ms = findingMeshes(f);
    if(ms.length){
      ms.slice(0,3).forEach(function(m){ meta.appendChild(el('span', {class:'tag', text:m, title:m})); });
      if(ms.length > 3) meta.appendChild(el('span', {class:'tag', text:'+' + (ms.length - 3)}));
    } else {
      meta.appendChild(el('span', {class:'tag cp', text:'control plane'}));
    }
    head.appendChild(meta);
    head.appendChild(el('span', {class:'f-count num', text:fmtNum(cnt), title:cnt + ' occurrence' + (cnt === 1 ? '' : 's')}));
    head.appendChild(el('span', {class:'f-caret', text:'▸'}));

    var body = el('div', {class:'f-body'});
    body.appendChild(el('p', {class:'detail', text:f.detail}));
    if(spanAll){
      body.appendChild(el('p', {class:'detail note',
        text:'Counted across all meshes — the example sample is capped, so this finding can’t be split per mesh.'}));
    }
    var ex = shownExamples(f);
    if(ex.length){
      var box = el('div', {class:'ex'});
      ex.forEach(function(e){
        var sys = e.indexOf('(system') >= 0;
        box.appendChild(el('span', {class:'e' + (sys ? ' sys' : ''), text:e}));
      });
      if(cnt > ex.length) box.appendChild(el('span', {class:'more', text:'+' + (cnt - ex.length) + ' more'}));
      body.appendChild(box);
    }
    // Link to the Kong Mesh page explaining the 3.0 replacement API/feature. It is
    // a click target (opened on demand), not a loaded resource, so the page stays
    // fully self-contained and renders offline. The doc value can arrive from an
    // untrusted --from-json payload, so only ever build an href from an https
    // developer.konghq.com URL — never an arbitrary scheme (guards against a
    // javascript: link or an external host); anything else is dropped.
    if(f.doc && /^https:\/\/developer\.konghq\.com\//.test(f.doc)){
      body.appendChild(el('a', {'class':'doclink', href:f.doc, target:'_blank', rel:'noopener noreferrer',
        title:'Open the Kong Mesh migration docs for this item'},
        [document.createTextNode('Kong Mesh migration docs '), el('span', {class:'arr', text:'↗'})]));
    }
    if(collapsed) body.style.display = 'none';

    head.addEventListener('click', function(){
      var now = !findingCollapsed(f);
      collapsedFindings[id] = now;
      body.style.display = now ? 'none' : '';
      wrap.classList.toggle('collapsed', now);
      head.setAttribute('aria-expanded', String(!now));
    });
    wrap.appendChild(head);
    wrap.appendChild(body);
    return wrap;
  }

  // renderGroup builds one collapsible group block: a clickable heading (with the
  // group's finding count) over a body of findings. Collapse state is keyed by
  // severity+group so it survives filter/search re-renders.
  function renderGroup(sev, group, items){
    var gid = sev + '|' + group;
    var collapsed = !!collapsedGroups[gid];
    var gTotal = items.reduce(function(a,f){ return a + shownCount(f); }, 0);
    var block = el('div', {class:'grpblock', id:'g-' + sev + '-' + slug(group)});
    var head = el('button', {class:'grp-title' + (collapsed ? ' collapsed' : ''), type:'button',
      'aria-expanded': String(!collapsed), title:(collapsed ? 'Expand ' : 'Collapse ') + group});
    head.appendChild(el('span', {class:'caret', text:'▸'}));
    head.appendChild(el('span', {text:group}));
    head.appendChild(el('span', {class:'grp-count num', text:fmtNum(gTotal)}));
    var body = el('div', {class:'grp-body'});
    if(collapsed) body.style.display = 'none';
    head.addEventListener('click', function(){
      var now = !collapsedGroups[gid];
      collapsedGroups[gid] = now;
      body.style.display = now ? 'none' : '';
      head.classList.toggle('collapsed', now);
      head.setAttribute('aria-expanded', String(!now));
      head.setAttribute('title', (now ? 'Expand ' : 'Collapse ') + group);
    });
    items.forEach(function(f){ body.appendChild(renderFinding(f)); });
    block.appendChild(head);
    block.appendChild(body);
    return block;
  }

  function renderFindings(){
    var c = document.getElementById('findings');
    if(!c) return;
    c.innerHTML = '';
    if(meshFilter || sevFilter){
      var hint = el('div', {class:'meshhint'});
      hint.appendChild(document.createTextNode('Filtered to '));
      if(sevFilter){ hint.appendChild(el('b', {text:sevFilter + 's'})); hint.appendChild(document.createTextNode(meshFilter ? ' in ' : '')); }
      if(meshFilter){ hint.appendChild(document.createTextNode('mesh ')); hint.appendChild(el('b', {text:meshFilter})); hint.appendChild(document.createTextNode(' (plus control-plane-wide findings)')); }
      hint.appendChild(document.createTextNode('. '));
      hint.appendChild(el('button', {type:'button', onclick:function(){
        sevFilter = null;
        document.querySelectorAll('.card[data-sev]').forEach(function(x){ x.classList.remove('on'); x.setAttribute('aria-pressed','false'); });
        setMeshFilter(null);
      }}, 'Clear filters'));
      c.appendChild(hint);
    }

    var shown = shownFindings();
    buildNav(shown);
    if(!shown.length){
      c.appendChild(el('div', {class:'empty', text:'No findings match the current filter.'}));
      return;
    }
    SEV.forEach(function(sev){
      var fs = shown.filter(function(f){ return f.severity === sev; });
      if(!fs.length) return;
      var total = fs.reduce(function(a,f){ return a + shownCount(f); }, 0);
      var spanAny = meshFilter && fs.some(function(f){ return isMeshScoped(f) && isCapped(f); });
      var sec = el('section', {class:'grp', id:'sec-' + sev});
      sec.appendChild(el('div', {class:'sechead'}, [
        el('span', {class:'sd ' + sev}),
        document.createTextNode(HEADINGS[sev]),
        el('span', {class:'n num', text:fmtNum(total) + (spanAny ? ' (incl. all-mesh)' : '')})
      ]));
      var order = [], byGroup = {};
      fs.forEach(function(f){
        var g = groupOf(f);
        if(!byGroup[g]){ byGroup[g] = []; order.push(g); }
        byGroup[g].push(f);
      });
      order.forEach(function(g){ sec.appendChild(renderGroup(sev, g, byGroup[g])); });
      c.appendChild(sec);
    });
    // Arm the scrollspy now that every .grpblock section is in the DOM.
    setupSpy();
  }

  function renderCoverage(){
    var cov = data.coverageGaps || [];
    if(!cov.length) return null;
    var sec = el('section', {class:'grp', id:'sec-coverage'});
    sec.appendChild(el('h2', {class:'blockhead', text:'Coverage gaps — collections NOT audited'}));
    sec.appendChild(el('p', {class:'blocksub', text:'These were not read, so their absence from the blockers above is unproven. Investigate before trusting a clean result.'}));
    var body = el('div', {class:'grp-body'});
    cov.forEach(function(g){
      var card = el('div', {class:'finding warning'});
      var b = el('div', {class:'f-body', style:'border-top:0;margin-top:0;padding-top:13px'});
      b.appendChild(el('div', null, el('code', {text:g.path})));
      b.appendChild(el('p', {class:'detail', text:g.reason}));
      card.appendChild(b);
      body.appendChild(card);
    });
    sec.appendChild(body);
    return sec;
  }

  // copyText copies to the clipboard, falling back to a hidden textarea +
  // execCommand for file:// (a non-secure context where navigator.clipboard is
  // unavailable). Returns a promise resolving to whether the copy succeeded.
  function copyText(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      return navigator.clipboard.writeText(text).then(function(){ return true; }, function(){ return false; });
    }
    return new Promise(function(resolve){
      var ta = document.createElement('textarea');
      ta.value = text; ta.setAttribute('readonly', '');
      ta.style.position = 'absolute'; ta.style.left = '-9999px';
      document.body.appendChild(ta); ta.select();
      var ok = false;
      try { ok = document.execCommand('copy'); } catch(e){ ok = false; }
      document.body.removeChild(ta);
      resolve(ok);
    });
  }

  // renderCmd builds a copy-able command block: a code box with a Copy button that
  // gives transient feedback. Multi-line scripts are wrapped in a <details>
  // disclosure so a long block stays collapsed by default; one-liners render inline.
  function renderCmd(command){
    var box = el('div', {class:'cmdbox'});
    var btn = el('button', {'class':'copy', type:'button', 'aria-label':'Copy command', text:'Copy'});
    btn.addEventListener('click', function(){
      copyText(command).then(function(ok){
        btn.textContent = ok ? 'Copied' : 'Copy failed';
        setTimeout(function(){ btn.textContent = 'Copy'; }, 1500);
      });
    });
    box.appendChild(el('pre', {class:'cmd'}, el('code', {text:command})));
    box.appendChild(btn);
    if(command.indexOf('\n') < 0) return box;
    var det = el('details', {class:'cmd-collapsible'});
    det.appendChild(el('summary', {text:'Show command (' + command.split('\n').length + ' lines)'}));
    det.appendChild(box);
    return det;
  }

  // ---- manual checklist (progress persisted per report) ----
  function renderManual(){
    var items = data.manualChecks || [];
    if(!items.length) return null;
    var sig = [cp.product, cp.version, (data.meshes||[]).join('|'), items.length].join('::');
    var key = 'kuma3pf:manual:' + sig;
    var saved;
    try { saved = JSON.parse(localStorage.getItem(key)) || []; } catch(e){ saved = []; }
    var sec = el('section', {class:'grp', id:'sec-manual'});
    sec.appendChild(el('h2', {class:'blockhead', text:'Manual checks (not detectable via the CP API)'}));
    sec.appendChild(el('p', {class:'blocksub', text:'Items the control-plane API cannot reveal. Work through them by hand before the upgrade.'}));
    var prog = el('p', {class:'prog'});
    sec.appendChild(prog);
    var ul = el('ul', {class:'manual'});
    function update(){
      saved = [];
      ul.querySelectorAll('input').forEach(function(cb, i){ if(cb.checked) saved.push(i); });
      localStorage.setItem(key, JSON.stringify(saved));
      prog.textContent = saved.length + ' / ' + items.length + ' done';
    }
    items.forEach(function(m, i){
      var li = el('li');
      var cb = el('input', {type:'checkbox', name:'manual-' + i, id:'manual-' + i, onchange:function(){
        li.classList.toggle('done', this.checked); update();
      }});
      if(saved.indexOf(i) >= 0){ cb.checked = true; li.classList.add('done'); }
      li.appendChild(el('label', null, [cb, el('span', {text:m.title})]));
      if(m.detail) li.appendChild(el('div', {class:'detail', text:m.detail}));
      if(m.command) li.appendChild(renderCmd(m.command));
      ul.appendChild(li);
    });
    prog.textContent = saved.length + ' / ' + items.length + ' done';
    sec.appendChild(ul);
    return sec;
  }

  // A spotless run: clean status with nothing flagged and nothing unread. This is
  // the "migration done" case — a celebration panel replaces the findings UI.
  function isSpotless(){
    var s = data.summary || {};
    return data.status === 'clean' && !(s.blockers || 0) && !(s.warnings || 0)
      && !(s.info || 0) && !(s.coverageGaps || 0) && !(s.parseErrors || 0);
  }
  function renderCelebrate(){
    var wrap = el('div', {class:'celebrate'});
    wrap.appendChild(el('div', {class:'cel-badge', text:'✓'}));
    wrap.appendChild(el('h2', {text:'Upgrade-ready — you’re clear for Kuma 3.0'}));
    wrap.appendChild(el('p', {text:'No blockers, no warnings, no coverage gaps. Every removed '
      + 'API, relocated field, Mesh setting and dataplane was audited and came back clean.'}));
    wrap.appendChild(el('p', {class:'cel-congrats',
      text:'🎉 Congratulations to the team — the migration work is done.'}));
    var meta = el('div', {class:'cel-meta'});
    meta.appendChild(el('span', null, el('b', {text:((cp.product || 'Kuma') + ' ' + (cp.version || '')).trim()})));
    if(cp.mode) meta.appendChild(el('span', {text:'mode: ' + cp.mode}));
    var nm = (data.meshes || []).length;
    meta.appendChild(el('span', null, [el('b', {text:String(nm)}),
      document.createTextNode(' mesh' + (nm === 1 ? '' : 'es') + ' audited, all clean')]));
    if(data.generatedAt) meta.appendChild(el('span', {text:'as of ' + fmtTime(data.generatedAt)}));
    wrap.appendChild(meta);
    return wrap;
  }
  function srcLine(prefix){
    return el('p', {class:'src'}, [document.createTextNode(prefix), el('code', {text:'docs/deprecated-features.md'})]);
  }

  // ---- compose ----
  app.appendChild(buildSidebar());
  var content = el('div', {class:'content'});
  app.appendChild(content);
  content.appendChild(renderHeader());

  if(data.status === 'failed'){
    content.appendChild(renderBanner());
    if(data.error) content.appendChild(el('div', {class:'err', text:data.error}));
    content.appendChild(srcLine('Re-run after fixing the cause. Source of truth: '));
    return;
  }

  if(isSpotless()){
    content.appendChild(renderCelebrate());
    var spotlessMan = renderManual(); if(spotlessMan) content.appendChild(spotlessMan);
    content.appendChild(srcLine('Source of truth: '));
    return;
  }

  content.appendChild(renderBanner());
  content.appendChild(renderOverview());
  content.appendChild(renderToolbar());
  content.appendChild(el('div', {id:'findings'}));
  renderFindings();
  var cov = renderCoverage(); if(cov) content.appendChild(cov);
  var man = renderManual(); if(man) content.appendChild(man);
  content.appendChild(srcLine('Source of truth: '));
})();
</script>
</body>
</html>
