[tools]
go = "1.26.4"
golangci-lint = "2.12.2"
# NilAway (Uber) — nil-panic static analysis; pinned by commit (no tagged releases).
"go:go.uber.org/nilaway/cmd/nilaway" = "0.0.0-20260617211854-01ab7e30fbe0"

[env]
GOFLAGS = "-mod=mod"

[tasks.build]
description = "Build the kuma3-preflight CLI into bin/"
sources = ["cmd/**/*.go", "go.mod"]
outputs = ["bin/kuma3-preflight"]
run = "go build -o bin/kuma3-preflight ./cmd/kuma3-preflight"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.lint]
description = "Run golangci-lint (must report 0 issues)"
run = "golangci-lint run"

[tasks.nilaway]
description = "Run NilAway nil-panic analysis (must report 0 issues)"
run = "nilaway ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.fmt]
description = "Format Go sources in place"
run = "gofmt -w cmd/"

[tasks.fmt-check]
description = "Fail if any Go source is unformatted"
run = '''
unformatted=$(gofmt -l cmd/)
if [ -n "$unformatted" ]; then
  echo "unformatted files:" >&2
  echo "$unformatted" >&2
  exit 1
fi
'''

[tasks.examples]
description = "Regenerate examples/html/*.html from the examples/json/*.json fixtures"
depends = ["build"]
sources = ["cmd/kuma3-preflight/html.go", "examples/json/*.json", "bin/kuma3-preflight"]
outputs = ["examples/html/*.html"]
run = "examples/regen.sh --no-build"

[tasks.check]
description = "Run all pre-commit quality gates"
depends = ["test", "lint", "nilaway", "vet", "fmt-check"]
