# Publish kuma3-preflight binaries to a GitHub Release (GoReleaser).
# The kuma/kong-mesh nightly readiness workflow downloads the linux asset from here.
#
# Two ways to cut a release:
#   * Run this workflow manually (Actions → Release → Run workflow): leave `version`
#     blank to auto-bump the latest tag (`bump` picks patch/minor/major), or set
#     `version` to release an explicit tag. The workflow creates + pushes the tag,
#     then GoReleaser publishes against it.
#   * Push a `v*` tag yourself — GoReleaser releases that tag as-is.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version to release, e.g. v1.2.3. Blank = auto-bump."
        required: false
        type: string
      bump:
        description: "Auto-bump level when version is blank."
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write # create the release + push the tag

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # GoReleaser needs full history/tags for changelogs

      # Tag-push events already carry the tag; for manual runs resolve the version
      # (explicit input or auto-bump), then create + push the tag on this commit so
      # GoReleaser finds HEAD == tag.
      - name: Resolve release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_VERSION" ]; then
            tag="$INPUT_VERSION"
            [ "${tag#v}" = "$tag" ] && tag="v$tag"
          else
            latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            [ -z "$latest" ] && latest="v0.0.0"
            ver="${latest#v}"
            major="${ver%%.*}"; rest="${ver#*.}"
            minor="${rest%%.*}"; patch="${rest#*.}"; patch="${patch%%-*}"
            case "$INPUT_BUMP" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              *)     patch=$((patch + 1)) ;;
            esac
            tag="v${major}.${minor}.${patch}"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::invalid version '$tag' (expected vMAJOR.MINOR.PATCH[-prerelease])"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "::error::tag $tag already exists"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "refs/tags/$tag"
          echo "::notice::created and pushed tag $tag"

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
