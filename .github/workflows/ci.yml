# Basic CI: format, vet, lint, nilaway, test, build — on every PR and on main.
# Tooling (Go, golangci-lint, nilaway) is pinned via mise.toml.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          # TODO: drop once https://github.com/jdx/mise/discussions/9889 is fixed (mise v2026.5.8 broke cosign).
          version: 2026.5.7
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: gofmt
        run: |
          # gofmt recurses into a directory; check the whole repo, not just cmd/.
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        run: golangci-lint run

      - name: nilaway
        run: nilaway ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build -o /dev/null ./cmd/kuma3-preflight

      - name: examples up-to-date
        # Re-render examples/html/*.html from the committed JSON fixtures and fail
        # if anything changed — the checked-in pages must match the current
        # template (cmd/kuma3-preflight/html.go). Fix: `mise run examples`, commit.
        run: |
          examples/regen.sh
          # --porcelain catches both modified tracked pages and new untracked
          # ones (e.g. a fixture added without its rendered HTML), which a bare
          # `git diff` would miss.
          drift="$(git status --porcelain -- examples/html)"
          if [ -n "$drift" ]; then
            echo "::error::examples/html is out of date — run 'mise run examples' and commit the result."
            echo "$drift"
            exit 1
          fi
